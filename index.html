<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NOTOC文件拍摄</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2563eb;
      --warning: #f59e0b;
      --bg-dark: #0a0a0a;
      --text-white: #ffffff;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-dark); font-family: -apple-system, sans-serif; }
    .camera-container { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; }
    .status-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
    .status-title { color: var(--text-white); font-size: 16px; font-weight: 600; }
    .video-wrapper { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: var(--bg-dark); }
    .video-element { width: 100%; height: 100%; object-fit: cover; }
    .frame-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 850px; aspect-ratio: 297/210; pointer-events: none; }
    .frame-border { position: absolute; inset: -4px; border: 2px solid rgba(255, 255, 255, 0.6); border-radius: 4px; z-index: -1; }
    .section-overlay { position: absolute; left: 0; right: 0; pointer-events: none; }
    .section-1 { top: 0; height: 20%; border-bottom: 2px dashed rgba(255, 255, 255, 0.6); }
    .section-2 { top: 20%; height: 55%; border-bottom: 2px dashed rgba(255, 255, 255, 0.6); }
    .section-3 { top: 75%; bottom: 0; }
    .section-label-1, .section-label-2, .section-label-3 { position: absolute; top: 6px; left: 6px; color: rgba(255, 255, 255, 0.9); font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 4px; letter-spacing: 0.5px; }
    .section-label-1 { background: rgba(220, 38, 38, 0.8); }
    .section-label-2 { background: rgba(37, 99, 235, 0.8); }
    .section-label-3 { background: rgba(16, 185, 129, 0.8); }
    .control-bar { position: fixed; top: 50%; right: 16px; transform: translateY(-50%); z-index: 100; padding: 20px 12px; background: transparent; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .shutter-button { width: 64px; height: 64px; border-radius: 50%; border: 3px solid var(--text-white); background: transparent; cursor: pointer; position: relative; transition: all 0.2s ease; padding: 0; }
    .shutter-button::before { content: ''; position: absolute; inset: 4px; border-radius: 50%; background: var(--text-white); transition: all 0.2s ease; }
    .shutter-button:active::before { transform: scale(0.9); }
    .gallery-button { width: 48px; height: 48px; border-radius: 12px; border: 2px solid rgba(255, 255, 255, 0.5); background: rgba(255, 255, 255, 0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cancel-button { padding: 10px 20px; border: none; background: transparent; color: var(--text-white); font-size: 16px; font-weight: 500; cursor: pointer; }
    @media (max-width: 480px) {
      .control-bar { top: auto; bottom: 0; left: 0; right: 0; transform: none; flex-direction: row; padding: 12px 20px 28px; gap: 32px; }
      .shutter-button { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>
  <div class="camera-container">
    <div class="status-bar">
      <span class="status-title">NOTOC文件拍摄</span>
      <div class="orientation-indicator landscape" id="orientationIndicator">
        <span class="orientation-text">横屏模式</span>
      </div>
    </div>
    <div class="video-wrapper">
      <video class="video-element" id="videoElement" autoplay playsinline muted></video>
      <div class="frame-container">
        <div class="frame-border"></div>
        <div class="section-overlay section-1"><span class="section-label-1">头部信息</span></div>
        <div class="section-overlay section-2"><span class="section-label-2">主体表格</span></div>
        <div class="section-overlay section-3"><span class="section-label-3">签字区域</span></div>
      </div>
    </div>
    <div class="control-bar">
      <button class="cancel-button" id="cancelBtn">取消</button>
      <button class="shutter-button" id="shutterBtn"></button>
      <button class="gallery-button" id="galleryBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
    </div>
  </div>
  <script>
    const video = document.getElementById('videoElement');
    const shutterBtn = document.getElementById('shutterBtn');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => { video.srcObject = stream; });
    shutterBtn.addEventListener('click', () => {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      console.log(canvas.toDataURL('image/jpeg'));
    });
  </script>
</body>
</html>
